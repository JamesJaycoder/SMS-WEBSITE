<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Management System</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    margin:20px;
    transition:0.3s;
}

.container{
    max-width:1200px;
    margin:auto;
}

h1{
    text-align:center;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
    box-shadow:0 0 10px rgba(0,0,0,.1);
    transition:0.3s;
}

input, select{
    width:100%;
    padding:10px;
    margin:5px 0;
    box-sizing:border-box;
}

button{
    padding:10px 15px;
    cursor:pointer;
    margin:5px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th, td{
    border:1px solid #ddd;
    padding:10px;
    text-align:left;
}

th{
    background:#333;
    color:white;
}

/* DARK MODE */
.dark{
    background:#1e1e1e;
    color:white;
}

.dark .card{
    background:#2d2d2d;
    color:white;
}

.dark table{
    background:#2d2d2d;
    color:white;
}

.dark th{
    background:#000;
}

.dark input,
.dark select{
    background:#444;
    color:white;
    border:1px solid #666;
}
</style>
</head>

<body>

<div class="container">

<h1>Student Management System</h1>

<button onclick="toggleDarkMode()">🌙 Dark Mode</button>

<!-- DASHBOARD -->
<div class="card">
<h2>Total Students: <span id="total">0</span></h2>
<h3>Regular: <span id="regularCount">0</span></h3>
<h3>Irregular: <span id="irregularCount">0</span></h3>
<h3>With Illness: <span id="illnessCount">0</span></h3>
</div>

<!-- ADD / EDIT FORM -->
<div class="card">
<h2 id="formTitle">Add Student</h2>

<input type="number" id="id" placeholder="Student ID">
<input type="text" id="name" placeholder="Name">
<input type="number" id="age" placeholder="Age">
<input type="text" id="gender" placeholder="Gender">
<input type="text" id="program" placeholder="Program (ALL CAPS)">

<select id="status">
<option value="">Select Status</option>
<option>Regular</option>
<option>Irregular</option>
</select>

<input type="text" id="contact" placeholder="Contact Number">
<input type="text" id="address" placeholder="Address">

<select id="hasIllness">
<option value="">Has Illness?</option>
<option>Yes</option>
<option>No</option>
</select>

<input type="text" id="illness" placeholder="Illness">

<button onclick="saveStudent()">Save Student</button>
<button onclick="clearForm()">Cancel</button>
</div>

<!-- SEARCH -->
<div class="card">
<h2>Search Student</h2>
<input type="text" id="search" onkeyup="searchStudent()" placeholder="Search by ID or Name">
</div>

<!-- SORT -->
<div class="card">
<button onclick="sortByName()">Sort By Name</button>
<button onclick="sortByID()">Sort By ID</button>
</div>

<!-- TABLE -->
<div class="card">
<table>
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Age</th>
<th>Gender</th>
<th>Program</th>
<th>Status</th>
<th>Contact</th>
<th>Address</th>
<th>Illness</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="studentTable"></tbody>
</table>
</div>

</div>

<script>

let students = JSON.parse(localStorage.getItem("students")) || [];
let editIndex = -1;

function saveData(){
    localStorage.setItem("students", JSON.stringify(students));
}

function toggleDarkMode(){
    document.body.classList.toggle("dark");
}

/* DASHBOARD */
function updateTotal(){

    document.getElementById("total").innerText = students.length;

    let regular = students.filter(s => s.status === "Regular").length;
    let irregular = students.filter(s => s.status === "Irregular").length;
    let illness = students.filter(s => s.hasIllness === "Yes").length;

    document.getElementById("regularCount").innerText = regular;
    document.getElementById("irregularCount").innerText = irregular;
    document.getElementById("illnessCount").innerText = illness;
}

/* SAVE OR UPDATE */
function saveStudent(){

    let id = document.getElementById("id").value;
    let name = document.getElementById("name").value;
    let age = document.getElementById("age").value;
    let gender = document.getElementById("gender").value;
    let program = document.getElementById("program").value;
    let status = document.getElementById("status").value;
    let contact = document.getElementById("contact").value;
    let address = document.getElementById("address").value;
    let hasIllness = document.getElementById("hasIllness").value;
    let illness = document.getElementById("illness").value;

    if(!id || !name){
        alert("ID and Name required!");
        return;
    }

    if(name.charAt(0) !== name.charAt(0).toUpperCase()){
        alert("Name must start with CAPITAL letter!");
        return;
    }

    if(program !== program.toUpperCase()){
        alert("Program must be ALL CAPS!");
        return;
    }

    if(hasIllness === "No"){
        illness = "None";
    }

    let data = {
        id, name, age, gender,
        program, status,
        contact, address,
        hasIllness, illness
    };

    if(editIndex === -1){
        students.push(data);
    } else {
        students[editIndex] = data;
        editIndex = -1;
        document.getElementById("formTitle").innerText = "Add Student";
    }

    saveData();
    displayStudents();
    clearForm();
}

/* DISPLAY */
function displayStudents(list = students){

    let table = document.getElementById("studentTable");
    table.innerHTML = "";

    list.forEach((student,index)=>{

        table.innerHTML += `
        <tr>
            <td>${student.id}</td>
            <td>${student.name}</td>
            <td>${student.age}</td>
            <td>${student.gender}</td>
            <td>${student.program}</td>
            <td>${student.status}</td>
            <td>${student.contact}</td>
            <td>${student.address}</td>
            <td>${student.illness}</td>
            <td>
                <button onclick="editStudent(${index})">Edit</button>
                <button onclick="deleteStudent(${index})">Delete</button>
            </td>
        </tr>
        `;
    });

    updateTotal();
}

/* EDIT (NO PROMPT) */
function editStudent(index){

    let s = students[index];

    document.getElementById("id").value = s.id;
    document.getElementById("name").value = s.name;
    document.getElementById("age").value = s.age;
    document.getElementById("gender").value = s.gender;
    document.getElementById("program").value = s.program;
    document.getElementById("status").value = s.status;
    document.getElementById("contact").value = s.contact;
    document.getElementById("address").value = s.address;
    document.getElementById("hasIllness").value = s.hasIllness;
    document.getElementById("illness").value = s.illness;

    editIndex = index;

    document.getElementById("formTitle").innerText = "Edit Student";
}

/* CLEAR FORM */
function clearForm(){
    document.querySelectorAll("input").forEach(i => i.value = "");
    document.getElementById("illness").value = "";
    editIndex = -1;
    document.getElementById("formTitle").innerText = "Add Student";
}

/* DELETE */
function deleteStudent(index){

    if(confirm("Delete this student?")){
        students.splice(index,1);
        saveData();
        displayStudents();
    }
}

/* SEARCH */
function searchStudent(){

    let key = document.getElementById("search").value.toLowerCase();

    let result = students.filter(s =>
        s.name.toLowerCase().includes(key) ||
        s.id.toString().includes(key)
    );

    displayStudents(result);
}

/* SORT */
function sortByName(){
    students.sort((a,b)=>a.name.localeCompare(b.name));
    saveData();
    displayStudents();
}

function sortByID(){
    students.sort((a,b)=>Number(a.id)-Number(b.id));
    saveData();
    displayStudents();
}

displayStudents();

</script>

</body>
</html>
